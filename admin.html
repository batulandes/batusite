<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta name="robots" content="noindex, nofollow">

  <title>BATU — Yönetim Paneli</title>

  <style>
    :root {
      --bg: #000;
      --panel: #090909;
      --panel-2: #101010;
      --text: #fff;
      --muted: #999;
      --border: rgba(255, 255, 255, 0.12);
      --border-strong: rgba(255, 255, 255, 0.24);
      --danger: #ff5d5d;
      --success: #62d68b;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      color-scheme: dark;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family:
        "TT Firs Neue",
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Arial,
        sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    [hidden] {
      display: none !important;
    }

    .container {
      width: min(100% - 24px, 1080px);
      margin: 0 auto;
    }

    .login-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login-card {
      width: min(100%, 430px);
      padding: 28px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
    }

    .login-logo {
      width: 68px;
      height: 68px;
      margin: 0 auto 24px;
      object-fit: contain;
    }

    .login-card h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .login-card > p {
      color: var(--muted);
      text-align: center;
      margin-bottom: 26px;
    }

    .dashboard {
      padding-bottom: 80px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.82);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .topbar-inner {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      width: 34px;
      height: 34px;
      object-fit: contain;
    }

    .brand strong {
      display: block;
      font-size: 0.95rem;
    }

    .brand span {
      display: block;
      color: var(--muted);
      font-size: 0.75rem;
    }

    .top-actions {
      display: flex;
      gap: 8px;
    }

    .main {
      padding-top: 30px;
    }

    .intro {
      margin-bottom: 28px;
    }

    .intro h1 {
      font-size: clamp(2rem, 7vw, 3.8rem);
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
    }

    .intro p {
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 22px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .panel-head {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid var(--border);
    }

    .panel-head h2 {
      font-size: 1.15rem;
    }

    .panel-head p {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 3px;
    }

    .form {
      padding: 20px;
    }

    .fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      color: #d7d7d7;
      font-size: 0.82rem;
    }

    input,
    textarea,
    select {
      width: 100%;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      padding: 13px 14px;
      transition:
        border-color 0.2s ease,
        background 0.2s ease;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--border-strong);
      background: #141414;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    .checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      padding-top: 5px;
    }

    .check {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: #ddd;
      font-size: 0.88rem;
    }

    .check input {
      width: 18px;
      height: 18px;
      accent-color: #fff;
    }

    .image-area {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 16px;
      align-items: center;
    }

    .preview {
      width: 140px;
      aspect-ratio: 16 / 10;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--muted);
      background: #050505;
      border: 1px dashed var(--border-strong);
      border-radius: 12px;
      font-size: 0.75rem;
      text-align: center;
    }

    .preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .file-info {
      color: var(--muted);
      font-size: 0.76rem;
      margin-top: 6px;
    }

    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .button {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 16px;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      transition:
        transform 0.2s ease,
        background 0.2s ease,
        color 0.2s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button.primary {
      color: #000;
      background: #fff;
      border-color: #fff;
      font-weight: 600;
    }

    .button.danger {
      color: var(--danger);
    }

    .button.small {
      min-height: 36px;
      padding: 0 13px;
      font-size: 0.78rem;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .projects {
      display: flex;
      flex-direction: column;
    }

    .project-item {
      padding: 15px;
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 14px;
      border-bottom: 1px solid var(--border);
    }

    .project-item:last-child {
      border-bottom: 0;
    }

    .project-thumb {
      width: 92px;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      background: #050505;
      border-radius: 10px;
    }

    .project-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .project-info {
      min-width: 0;
    }

    .project-info h3 {
      font-size: 0.95rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-info p {
      color: var(--muted);
      font-size: 0.75rem;
      margin: 3px 0 10px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #777;
    }

    .status.live::before {
      background: var(--success);
    }

    .item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .empty {
      padding: 35px 20px;
      color: var(--muted);
      text-align: center;
      font-size: 0.9rem;
    }

    .message {
      min-height: 22px;
      margin-top: 14px;
      font-size: 0.82rem;
    }

    .message.error {
      color: var(--danger);
    }

    .message.success {
      color: var(--success);
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 100;
      max-width: calc(100% - 32px);
      padding: 13px 16px;
      color: #000;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.5);
      font-size: 0.85rem;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition:
        opacity 0.25s ease,
        visibility 0.25s ease,
        transform 0.25s ease;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }

    @media (max-width: 840px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .projects-panel {
        order: -1;
      }
    }

    @media (max-width: 560px) {
      .container {
        width: min(100% - 20px, 1080px);
      }

      .topbar-inner {
        min-height: 66px;
      }

      .brand span {
        display: none;
      }

      .top-actions .view-site {
        display: none;
      }

      .main {
        padding-top: 22px;
      }

      .intro {
        margin-bottom: 21px;
      }

      .panel-head,
      .form {
        padding: 16px;
      }

      .fields {
        grid-template-columns: 1fr;
      }

      .field.full {
        grid-column: auto;
      }

      .image-area {
        grid-template-columns: 1fr;
      }

      .preview {
        width: 100%;
        max-width: 260px;
      }

      .form-actions {
        flex-direction: column;
      }

      .form-actions .button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <!-- Giriş ekranı -->
  <section class="login-screen" id="login-screen">
    <form class="login-card" id="login-form">
      <img
        class="login-logo"
        src="https://i.ibb.co/vCkfYL5M/batulogo2026png-1.png"
        alt="Batu logosu"
      >

      <h1>Yönetim Paneli</h1>

      <p>Projelerini telefondan yönet.</p>

      <div class="field">
        <label for="login-email">E-posta</label>

        <input
          id="login-email"
          type="email"
          autocomplete="email"
          required
        >
      </div>

      <div class="field" style="margin-top: 14px;">
        <label for="login-password">Şifre</label>

        <input
          id="login-password"
          type="password"
          autocomplete="current-password"
          required
        >
      </div>

      <button
        class="button primary"
        id="login-button"
        type="submit"
        style="width: 100%; margin-top: 20px;"
      >
        Giriş Yap
      </button>

      <p class="message" id="login-message"></p>
    </form>
  </section>

  <!-- Yönetim paneli -->
  <div class="dashboard" id="dashboard" hidden>
    <header class="topbar">
      <div class="container topbar-inner">
        <div class="brand">
          <img
            src="https://i.ibb.co/vCkfYL5M/batulogo2026png-1.png"
            alt="Batu logosu"
          >

          <div>
            <strong>BATU Yönetim</strong>
            <span id="admin-email"></span>
          </div>
        </div>

        <div class="top-actions">
          <a
            class="button small view-site"
            href="index.html"
            target="_blank"
          >
            Siteyi Gör
          </a>

          <button
            class="button small"
            id="logout-button"
            type="button"
          >
            Çıkış
          </button>
        </div>
      </div>
    </header>

    <main class="container main">
      <section class="intro">
        <h1>Projeler</h1>
        <p>Yeni proje ekle veya mevcut projelerini düzenle.</p>
      </section>

      <div class="layout">
        <!-- Proje formu -->
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2 id="form-title">Yeni proje</h2>
              <p>Bilgileri doldur ve kaydet.</p>
            </div>
          </div>

          <form class="form" id="project-form">
            <input id="project-id" type="hidden">
            <input id="existing-image" type="hidden">

            <div class="fields">
              <div class="field">
                <label for="title">Proje başlığı *</label>

                <input
                  id="title"
                  type="text"
                  placeholder="Lemonhota YouTube Kanalı"
                  required
                >
              </div>

              <div class="field">
                <label for="slug">Bağlantı adı *</label>

                <input
                  id="slug"
                  type="text"
                  placeholder="lemonhota-youtube-kanali"
                  required
                >
              </div>

              <div class="field">
                <label for="category">Kategori</label>

                <input
                  id="category"
                  type="text"
                  placeholder="YouTube Tasarımı"
                >
              </div>

              <div class="field">
                <label for="year">Yıl</label>

                <input
                  id="year"
                  type="number"
                  inputmode="numeric"
                  min="2000"
                  max="2100"
                  placeholder="2026"
                >
              </div>

              <div class="field full">
                <label for="short-description">
                  Kısa açıklama
                </label>

                <textarea
                  id="short-description"
                  placeholder="Ana sayfadaki proje kartında görünecek kısa açıklama."
                ></textarea>
              </div>

              <div class="field full">
                <label for="description">
                  Detaylı açıklama
                </label>

                <textarea
                  id="description"
                  placeholder="Proje detay sayfasında görünecek uzun açıklama."
                  style="min-height: 160px;"
                ></textarea>
              </div>

              <div class="field full">
                <label>Kapak görseli</label>

                <div class="image-area">
                  <div class="preview" id="image-preview">
                    Görsel seçilmedi
                  </div>

                  <div>
                    <input
                      id="cover-file"
                      type="file"
                      accept="image/jpeg,image/png,image/webp,image/gif"
                    >

                    <p class="file-info">
                      JPG, PNG, WEBP veya GIF. En fazla 10 MB.
                    </p>
                  </div>
                </div>
              </div>

              <div class="field full">
                <label for="project-url">
                  Proje bağlantısı
                </label>

                <input
                  id="project-url"
                  type="url"
                  inputmode="url"
                  placeholder="https://youtube.com/@lemonhota"
                >
              </div>

              <div class="field">
                <label for="sort-order">Sıralama</label>

                <input
                  id="sort-order"
                  type="number"
                  inputmode="numeric"
                  value="0"
                >
              </div>

              <div class="field">
                <label>Yayın ayarları</label>

                <div class="checkboxes">
                  <label class="check">
                    <input id="published" type="checkbox" checked>
                    Yayında
                  </label>

                  <label class="check">
                    <input id="featured" type="checkbox">
                    Öne çıkar
                  </label>
                </div>
              </div>
            </div>

            <div class="form-actions">
              <button
                class="button primary"
                id="save-button"
                type="submit"
              >
                Projeyi Kaydet
              </button>

              <button
                class="button"
                id="cancel-edit"
                type="button"
                hidden
              >
                Düzenlemeyi İptal Et
              </button>

              <button
                class="button"
                id="reset-button"
                type="button"
              >
                Formu Temizle
              </button>
            </div>

            <p class="message" id="form-message"></p>
          </form>
        </section>

        <!-- Proje listesi -->
        <aside class="panel projects-panel">
          <div class="panel-head">
            <div>
              <h2>Mevcut projeler</h2>
              <p id="project-count">Yükleniyor…</p>
            </div>

            <button
              class="button small"
              id="refresh-button"
              type="button"
            >
              Yenile
            </button>
          </div>

          <div class="projects" id="project-list">
            <div class="empty">Projeler yükleniyor…</div>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>
