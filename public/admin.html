<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta name="robots" content="noindex, nofollow">

  <title>BATU — Yönetim Paneli</title>

  <style>
    :root {
      --background: #000;
      --panel: #0b0b0b;
      --field: #141414;
      --text: #fff;
      --muted: #999;
      --border: #292929;
      --danger: #ff6969;
      --success: #6fdf99;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--background);
      font-family: Arial, sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    [hidden] {
      display: none !important;
    }

    .container {
      width: min(1080px, calc(100% - 24px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(0, 0, 0, 0.86);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
    }

    .topbar-inner {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .brand img {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    .brand strong,
    .brand small {
      display: block;
    }

    .brand small {
      color: var(--muted);
    }

    .button {
      padding: 11px 16px;
      color: #fff;
      background: transparent;
      border: 1px solid #444;
      border-radius: 999px;
    }

    .button.primary {
      color: #000;
      background: #fff;
      border-color: #fff;
      font-weight: 700;
    }

    .button.danger {
      color: var(--danger);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .main {
      padding: 28px 0 70px;
    }

    .intro h1 {
      margin: 0 0 8px;
      font-size: clamp(36px, 8vw, 60px);
    }

    .intro p {
      margin: 0 0 27px;
      color: var(--muted);
    }

    .warning {
      margin-bottom: 20px;
      padding: 14px;
      color: #ffd59a;
      background: #1a1207;
      border: 1px solid #513714;
      border-radius: 13px;
      font-size: 13px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
      align-items: start;
    }

    .panel {
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .panel-head {
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .panel-head small {
      color: var(--muted);
    }

    .form {
      padding: 18px;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .span-2 {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #ddd;
      font-size: 13px;
    }

    input,
    textarea {
      width: 100%;
      padding: 13px;
      color: #fff;
      background: var(--field);
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: #666;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .preview {
      width: 100%;
      aspect-ratio: 16 / 9;
      margin-bottom: 10px;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--muted);
      border: 1px dashed #444;
      border-radius: 12px;
    }

    .preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ddd;
      font-size: 14px;
    }

    .check input {
      width: 18px;
      height: 18px;
    }

    .form-actions {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .message {
      min-height: 22px;
      margin: 13px 0 0;
      font-size: 13px;
    }

    .message.error {
      color: var(--danger);
    }

    .message.success {
      color: var(--success);
    }

    .project-item {
      padding: 14px;
      display: grid;
      grid-template-columns: 90px minmax(0, 1fr);
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .project-item:last-child {
      border-bottom: 0;
    }

    .project-item img {
      width: 90px;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: #111;
      border-radius: 10px;
    }

    .project-item h3 {
      margin: 0 0 5px;
      font-size: 15px;
    }

    .project-item p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .project-actions {
      margin-top: 10px;
      display: flex;
      gap: 7px;
    }

    .empty {
      padding: 30px 18px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 820px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .projects-panel {
        order: -1;
      }
    }

    @media (max-width: 560px) {
      .fields {
        grid-template-columns: 1fr;
      }

      .span-2 {
        grid-column: auto;
      }

      .form-actions {
        flex-direction: column;
      }

      .form-actions .button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="container topbar-inner">

      <div class="brand">
        <img
          src="https://i.ibb.co/vCkfYL5M/batulogo2026png-1.png"
          alt="BATU"
        >

        <div>
          <strong>BATU Yönetim</strong>
          <small>Girişsiz geçici panel</small>
        </div>
      </div>

      <a
        class="button"
        href="/"
        target="_blank"
      >
        Siteyi Gör
      </a>

    </div>
  </header>

  <main class="container main">

    <section class="intro">
      <h1>Projeler</h1>
      <p>Yeni proje ekle veya mevcut projelerini düzenle.</p>
    </section>

    <div class="warning">
      Bu panel şu anda girişsiz çalışıyor. Adresi bulan biri projeleri değiştirebilir.
    </div>

    <div class="layout">

      <section class="panel">

        <div class="panel-head">
          <h2 id="formTitle">Yeni proje</h2>
        </div>

        <form
          class="form"
          id="projectForm"
        >
          <input
            id="projectId"
            type="hidden"
          >

          <input
            id="existingImage"
            type="hidden"
          >

          <div class="fields">

            <div>
              <label for="title">
                Proje başlığı *
              </label>

              <input
                id="title"
                type="text"
                required
              >
            </div>

            <div>
              <label for="slug">
                Bağlantı adı *
              </label>

              <input
                id="slug"
                type="text"
                required
              >
            </div>

            <div>
              <label for="category">
                Kategori
              </label>

              <input
                id="category"
                type="text"
              >
            </div>

            <div>
              <label for="year">
                Yıl
              </label>

              <input
                id="year"
                type="number"
                inputmode="numeric"
              >
            </div>

            <div class="span-2">
              <label for="shortDescription">
                Kısa açıklama
              </label>

              <textarea
                id="shortDescription"
              ></textarea>
            </div>

            <div class="span-2">
              <label for="description">
                Detaylı açıklama
              </label>

              <textarea
                id="description"
              ></textarea>
            </div>

            <div class="span-2">
              <label for="coverFile">
                Kapak görseli
              </label>

              <div
                class="preview"
                id="preview"
              >
                Görsel seçilmedi
              </div>

              <input
                id="coverFile"
                type="file"
                accept="image/jpeg,image/png,image/webp,image/gif"
              >
            </div>

            <div class="span-2">
              <label for="projectUrl">
                Proje bağlantısı
              </label>

              <input
                id="projectUrl"
                type="url"
                placeholder="https://"
              >
            </div>

            <div>
              <label for="sortOrder">
                Sıralama
              </label>

              <input
                id="sortOrder"
                type="number"
                value="0"
              >
            </div>

            <div>
              <label>Yayın ayarları</label>

              <div class="checkboxes">

                <label class="check">
                  <input
                    id="published"
                    type="checkbox"
                    checked
                  >
                  Yayında
                </label>

                <label class="check">
                  <input
                    id="featured"
                    type="checkbox"
                  >
                  Öne çıkar
                </label>

              </div>
            </div>

          </div>

          <div class="form-actions">

            <button
              class="button primary"
              id="saveButton"
              type="submit"
            >
              Projeyi Kaydet
            </button>

            <button
              class="button"
              id="cancelButton"
              type="button"
              hidden
            >
              Düzenlemeyi İptal Et
            </button>

            <button
              class="button"
              id="clearButton"
              type="button"
            >
              Formu Temizle
            </button>

          </div>

          <p
            class="message"
            id="formMessage"
          ></p>

        </form>
      </section>

      <aside class="panel projects-panel">

        <div class="panel-head">

          <div>
            <h2>Mevcut projeler</h2>

            <small id="projectCount">
              Yükleniyor…
            </small>
          </div>

          <button
            class="button"
            id="refreshButton"
            type="button"
          >
            Yenile
          </button>

        </div>

        <div id="projectList">
          <div class="empty">
            Projeler yükleniyor…
          </div>
        </div>

      </aside>

    </div>
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
  ></script>

  <script>
    const SUPABASE_URL =
      "https://phreqbjgynchbynmtefz.supabase.co";

    const SUPABASE_KEY =
      "sb_publishable_BWfR-8PgH0RIfLDngFDjUA_2vbIo-Ae";

    const supabaseClient =
      window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
      );

    const projectForm =
      document.getElementById("projectForm");

    const projectList =
      document.getElementById("projectList");

    const projectCount =
      document.getElementById("projectCount");

    const formMessage =
      document.getElementById("formMessage");

    const formTitle =
      document.getElementById("formTitle");

    const saveButton =
      document.getElementById("saveButton");

    const cancelButton =
      document.getElementById("cancelButton");

    const clearButton =
      document.getElementById("clearButton");

    const refreshButton =
      document.getElementById("refreshButton");

    const coverFile =
      document.getElementById("coverFile");

    const preview =
      document.getElementById("preview");

    let projects = [];
    let previewUrl = "";

    function setMessage(
      text,
      type = ""
    ) {
      formMessage.textContent = text;

      formMessage.className =
        `message${type ? ` ${type}` : ""}`;
    }

    function escapeHTML(value = "") {
      return String(value).replace(
        /[&<>"']/g,
        (character) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        })[character]
      );
    }

    function slugify(value) {
      return value
        .toLocaleLowerCase("tr-TR")
        .trim()
        .replaceAll("ı", "i")
        .replaceAll("ğ", "g")
        .replaceAll("ü", "u")
        .replaceAll("ş", "s")
        .replaceAll("ö", "o")
        .replaceAll("ç", "c")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    document
      .getElementById("title")
      .addEventListener(
        "input",
        (event) => {
          const slugInput =
            document.getElementById("slug");

          if (!slugInput.dataset.manual) {
            slugInput.value =
              slugify(event.target.value);
          }
        }
      );

    document
      .getElementById("slug")
      .addEventListener(
        "input",
        (event) => {
          event.target.dataset.manual = "1";

          event.target.value =
            slugify(event.target.value);
        }
      );

    coverFile.addEventListener(
      "change",
      () => {
        const file =
          coverFile.files[0];

        if (!file) {
          return;
        }

        if (file.size > 10 * 1024 * 1024) {
          alert(
            "Görsel 10 MB'dan büyük olamaz."
          );

          coverFile.value = "";

          return;
        }

        if (previewUrl) {
          URL.revokeObjectURL(previewUrl);
        }

        previewUrl =
          URL.createObjectURL(file);

        preview.innerHTML =
          `<img src="${previewUrl}" alt="Önizleme">`;
      }
    );

    async function uploadImage(file) {
      const extension =
        (file.name.split(".").pop() || "jpg")
          .replace(/[^a-z0-9]/gi, "");

      const filePath =
        `projects/${crypto.randomUUID()}.${extension}`;

      const { error } =
        await supabaseClient.storage
          .from("project-images")
          .upload(filePath, file, {
            contentType: file.type,
            upsert: false
          });

      if (error) {
        throw error;
      }

      const { data } =
        supabaseClient.storage
          .from("project-images")
          .getPublicUrl(filePath);

      return data.publicUrl;
    }

    projectForm.addEventListener(
      "submit",
      async (event) => {
        event.preventDefault();

        setMessage("");

        const projectId =
          document
            .getElementById("projectId")
            .value;

        const existingImage =
          document
            .getElementById("existingImage")
            .value;

        const title =
          document
            .getElementById("title")
            .value
            .trim();

        const slug =
          slugify(
            document
              .getElementById("slug")
              .value
          );

        const file =
          coverFile.files[0];

        if (!title || !slug) {
          setMessage(
            "Başlık ve bağlantı adı zorunlu.",
            "error"
          );

          return;
        }

        if (!file && !existingImage) {
          setMessage(
            "Kapak görseli seç.",
            "error"
          );

          return;
        }

        saveButton.disabled = true;
        saveButton.textContent =
          "Kaydediliyor…";

        try {
          let coverImage =
            existingImage;

          if (file) {
            coverImage =
              await uploadImage(file);
          }

          const yearValue =
            document
              .getElementById("year")
              .value;

          const payload = {
            title,
            slug,

            category:
              document
                .getElementById("category")
                .value
                .trim(),

            year:
              yearValue
                ? Number(yearValue)
                : null,

            short_description:
              document
                .getElementById(
                  "shortDescription"
                )
                .value
                .trim(),

            description:
              document
                .getElementById(
                  "description"
                )
                .value
                .trim(),

            cover_image:
              coverImage,

            project_url:
              document
                .getElementById(
                  "projectUrl"
                )
                .value
                .trim(),

            sort_order:
              Number(
                document
                  .getElementById(
                    "sortOrder"
                  )
                  .value
              ) || 0,

            published:
              document
                .getElementById(
                  "published"
                )
                .checked,

            featured:
              document
                .getElementById(
                  "featured"
                )
                .checked
          };

          let result;

          if (projectId) {
            result =
              await supabaseClient
                .from("projects")
                .update(payload)
                .eq("id", projectId);
          } else {
            result =
              await supabaseClient
                .from("projects")
                .insert(payload);
          }

          if (result.error) {
            throw result.error;
          }

          resetForm();

          setMessage(
            projectId
              ? "Proje güncellendi."
              : "Proje eklendi.",
            "success"
          );

          await loadProjects();
        } catch (error) {
          console.error(error);

          setMessage(
            error.message ||
              "Proje kaydedilemedi.",
            "error"
          );
        } finally {
          saveButton.disabled = false;
          saveButton.textContent =
            "Projeyi Kaydet";
        }
      }
    );

    async function loadProjects() {
      projectList.innerHTML =
        '<div class="empty">Projeler yükleniyor…</div>';

      projectCount.textContent =
        "Yükleniyor…";

      const { data, error } =
        await supabaseClient
          .from("projects")
          .select("*")
          .order("sort_order", {
            ascending: true
          })
          .order("created_at", {
            ascending: false
          });

      if (error) {
        projectList.innerHTML =
          `<div class="empty">${escapeHTML(
            error.message
          )}</div>`;

        projectCount.textContent =
          "Hata";

        return;
      }

      projects = data || [];

      renderProjects();
    }

    function renderProjects() {
      projectCount.textContent =
        `${projects.length} proje`;

      if (!projects.length) {
        projectList.innerHTML =
          '<div class="empty">Henüz proje eklenmedi.</div>';

        return;
      }

      projectList.innerHTML =
        projects
          .map((project) => `
            <article class="project-item">

              <img
