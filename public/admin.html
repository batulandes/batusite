<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Tasarım Yönetimi — BATU</title>

  <meta name="theme-color" content="#000000">

  <meta
    name="robots"
    content="noindex, nofollow"
  >

  <style>
    :root {
      --background: #000000;
      --surface: #080808;
      --surface-light: #0d0d0d;
      --text: #ffffff;
      --muted: #939393;
      --border: #252525;
      --border-light: #383838;
      --danger: #ff6262;
      --success: #70db8b;
      --container: 940px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      color-scheme: dark;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      background: var(--background);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Arial,
        sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button,
    input,
    textarea,
    select {
      color: inherit;
      font: inherit;
    }

    button,
    label,
    input,
    textarea,
    select {
      -webkit-tap-highlight-color: transparent;
    }

    button {
      cursor: pointer;
    }

    img {
      display: block;
      max-width: 100%;
    }

    [hidden] {
      display: none !important;
    }

    .container {
      width: min(
        var(--container),
        calc(100% - 30px)
      );
      margin-inline: auto;
    }

    .topbar {
      height: 76px;
      background: rgba(0, 0, 0, 0.72);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(17px);
      -webkit-backdrop-filter: blur(17px);
    }

    .topbar-inner {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar img {
      width: 52px;
      height: 52px;
      object-fit: contain;
    }

    .topbar-title {
      color: #858585;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .logout-button {
      padding: 9px 13px;
      color: #b4b4b4;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
    }

    .login-view {
      min-height: calc(100vh - 76px);
      display: grid;
      place-items: center;
      padding: 40px 0;
    }

    .login-card {
      width: min(430px, 100%);
      padding: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
    }

    .login-card h1 {
      font-size: 37px;
      letter-spacing: -0.045em;
    }

    .login-card p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .dashboard {
      padding: 48px 0 90px;
    }

    .dashboard-heading {
      margin-bottom: 31px;
      text-align: center;
    }

    .dashboard-heading h1 {
      font-size: clamp(40px, 7vw, 70px);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    .dashboard-heading p {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .panel {
      padding: 25px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
    }

    .panel + .panel {
      margin-top: 20px;
    }

    .panel-title {
      margin-bottom: 21px;
      font-size: 22px;
      letter-spacing: -0.025em;
    }

    .form-grid {
      display: grid;
      grid-template-columns:
        repeat(2, minmax(0, 1fr));
      gap: 15px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-full {
      grid-column: 1 / -1;
    }

    .field label {
      color: #aaaaaa;
      font-size: 12px;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      color: #ffffff;
      background: #030303;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      font-size: 14px;
      transition: border-color 0.2s ease;
    }

    .field textarea {
      min-height: 105px;
      resize: vertical;
      line-height: 1.55;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: #666666;
    }

    .upload-box {
      position: relative;
      min-height: 170px;
      padding: 25px;
      display: grid;
      place-items: center;
      background: #030303;
      border: 1px dashed #3a3a3a;
      border-radius: 15px;
      text-align: center;
      cursor: pointer;
    }

    .upload-box input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon {
      font-size: 30px;
    }

    .upload-title {
      margin-top: 9px;
      font-size: 15px;
      font-weight: 600;
    }

    .upload-description {
      margin-top: 6px;
      color: #747474;
      font-size: 12px;
    }

    .selected-files {
      margin-top: 12px;
      color: #aaaaaa;
      font-size: 12px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .checkbox-row {
      min-height: 48px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #030303;
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .checkbox-row input {
      width: 18px;
      height: 18px;
      accent-color: #ffffff;
    }

    .primary-button {
      width: 100%;
      min-height: 52px;
      margin-top: 20px;
      color: #000000;
      background: #ffffff;
      border: 1px solid #ffffff;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 650;
    }

    .primary-button:disabled {
      opacity: 0.45;
      cursor: wait;
    }

    .status-message {
      margin-top: 15px;
      padding: 13px;
      display: none;
      background: #030303;
      border: 1px solid var(--border);
      border-radius: 11px;
      color: #aaaaaa;
      font-size: 13px;
      line-height: 1.5;
    }

    .status-message.visible {
      display: block;
    }

    .status-message.error {
      color: var(--danger);
      border-color: rgba(255, 98, 98, 0.35);
    }

    .status-message.success {
      color: var(--success);
      border-color: rgba(112, 219, 139, 0.35);
    }

    .archive-toolbar {
      margin-bottom: 17px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
    }

    .archive-toolbar span {
      color: var(--muted);
      font-size: 12px;
    }

    .refresh-button {
      padding: 9px 13px;
      color: #b7b7b7;
      background: #050505;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
    }

    .admin-list {
      display: grid;
      gap: 11px;
    }

    .admin-item {
      padding: 11px;
      display: grid;
      grid-template-columns:
        90px minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      background: #030303;
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .admin-thumbnail {
      width: 90px;
      height: 90px;
      object-fit: cover;
      background: #111111;
      border-radius: 9px;
    }

    .admin-item-title {
      font-size: 14px;
      font-weight: 600;
      overflow-wrap: anywhere;
    }

    .admin-item-meta {
      margin-top: 6px;
      color: #777777;
      font-size: 11px;
      line-height: 1.5;
    }

    .admin-item-status {
      margin-top: 7px;
      font-size: 11px;
    }

    .admin-item-status.published {
      color: var(--success);
    }

    .admin-item-status.hidden {
      display: block !important;
      color: #8e8e8e;
    }

    .item-actions {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .item-button {
      min-width: 92px;
      min-height: 37px;
      padding: 0 11px;
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: #b5b5b5;
      font-size: 11px;
    }

    .item-button.delete {
      color: var(--danger);
    }

    .list-loading,
    .list-empty {
      padding: 35px 15px;
      color: #777777;
      text-align: center;
      font-size: 13px;
    }

    @media (max-width: 680px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .field-full {
        grid-column: auto;
      }

      .panel {
        padding: 18px;
        border-radius: 18px;
      }

      .admin-item {
        grid-template-columns:
          76px minmax(0, 1fr);
      }

      .admin-thumbnail {
        width: 76px;
        height: 76px;
      }

      .item-actions {
        grid-column: 1 / -1;
        flex-direction: row;
      }

      .item-button {
        flex: 1;
      }

      .topbar-title {
        display: none;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="container topbar-inner">

      <img
        src="https://i.ibb.co/vCkfYL5M/batulogo2026png-1.png"

            <button

            </button>

            <div

          </form>

        </div>
      </div>
    </section>

    <section
      class="dashboard"

      <div class="container">

        <div class="dashboard-heading">
          <h1>Tasarım Arşivi</h1>

          </p>
        </div>

        <section class="panel">

          <h2 class="panel-title">
            Yeni tasarım yükle
          </h2>

          <form id="upload-form">

            <label class="upload-box">

              <input
                id="design-files"
                type="file"
                accept="image/*"

                required
              >

              <span>
                <span class="upload-icon">＋</span>

                <span class="upload-title">
                  Galeriden görsel seç
                </span>

                <span class="upload-description">
                  Bir veya birden fazla tasarım seçebilirsin

                <span

              </span>

            </label>

            <div
              class="form-grid"
              style="margin-top: 17px;"
            >

              <div class="field">
                <label for="design-title">
                  Başlık
                </label>

                <input
                  id="design-title"
                  type="text"
                  placeholder="Boş kalırsa dosya adı kullanılır"

              </div>

              <div class="field">
                <label for="design-category">
                  Kategori
                </label>

                <input
                  id="design-category"

                  placeholder="Sosyal medya, afiş, logo..."

              </div>

              <div class="field">

                <input

                  max="2100"

                  placeholder="2026"

              </div>

              <div class="field">
                <label for="design-order">
                  Sıra
                </label>

                <input
                  id="design-order"
                  type="number"
                  inputmode="numeric"
                  value="0"
                >
              </div>

              <div class="field field-full">
                <label for="design-description">
                  Açıklama
                </label>

                <textarea
                  id="design-description"
                  placeholder="İsteğe bağlı kısa açıklama"
                ></textarea>
              </div>

              <div class="field field-full">
                <label class="checkbox-row">

                  <input
                    id="design-published"
                    type="checkbox"
                    checked
                  >

                  <span>
                    Arşivde hemen yayınla
                  </span>

                </label>
              </div>

            </div>

            <button
              class="primary-button"
              id="upload-button"
              type="submit"
            >
              Tasarımları Yayınla
            </button>

            <div
              class="status-message"
              id="upload-status"
            ></div>

          </form>

        </section>

        <section class="panel">

          <div class="archive-toolbar">

            <h2 class="panel-title">
              Yüklenen tasarımlar
            </h2>

            <button
              class="refresh-button"
              id="refresh-button"
              type="button"
            >
              Yenile
            </button>

          </div>

          <div
            class="admin-list"
            id="admin-list"
          ></div>

        </section>

      </div>
    </section>

  </main>

    const sanitizeFilename = (name) => {
      return name
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .slice(0, 70) || "tasarim";
    };

    const filenameWithoutExtension = (
      name
    ) => {
      return name.replace(
        /\.[^/.]+$/,
        ""

    };

    const compressImage = (
      file,
      maxDimension = 2400,
      quality = 0.88
    ) => {
      return new Promise(
        (resolve, reject) => {
          const image = new Image();
          const objectUrl =
            URL.createObjectURL(file);

          image.onload = () => {
            URL.revokeObjectURL(objectUrl);

            const longestSide = Math.max(
              image.naturalWidth,
              image.naturalHeight
            );

            const scale = Math.min(
              1,
              maxDimension / longestSide
            );

            const width = Math.max(
              1,
              Math.round(
                image.naturalWidth * scale
              )
            );

            const height = Math.max(
              1,
              Math.round(
                image.naturalHeight * scale
              )
            );

            const canvas =
              document.createElement("canvas");

            canvas.width = width;
            canvas.height = height;

            const context =
              canvas.getContext("2d");

            if (!context) {
              reject(
                new Error(
                  "Görsel işlenemedi."
                )
              );
              return;
            }

            context.drawImage(
              image,
              0,
              0,
              width,
              height
            );

            canvas.toBlob(
              (blob) => {
                if (!blob) {
                  reject(
                    new Error(
                      "Görsel sıkıştırılamadı."
                    )
                  );
                  return;
                }

                resolve(blob);
              },
              "image/webp",
              quality
            );
          };

          image.onerror = () => {
            URL.revokeObjectURL(objectUrl);

            reject(
              new Error(
                `${file.name} okunamadı.`
              )
            );
          };

          image.src = objectUrl;
        }
      );
    };
