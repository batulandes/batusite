<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>BATU — Yönetim Paneli</title>

  <style>
    :root {
      --bg: #000;
      --panel: #0b0b0b;
      --panel-2: #131313;
      --text: #fff;
      --muted: #9a9a9a;
      --border: #2a2a2a;
      --danger: #ff6969;
      --success: #72df98;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .hidden {
      display: none !important;
    }

    .wrap {
      width: min(1100px, calc(100% - 24px));
      margin: auto;
    }

    .login {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card,
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .login-card {
      width: min(420px, 100%);
      padding: 26px;
    }

    .logo {
      display: block;
      width: 62px;
      height: 62px;
      object-fit: contain;
      margin: 0 auto 20px;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    .login-card h1 {
      text-align: center;
      margin-bottom: 8px;
    }

    .login-card > p {
      text-align: center;
      color: var(--muted);
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #d4d4d4;
      margin-bottom: 7px;
    }

    .field {
      margin-bottom: 15px;
    }

    input,
    textarea {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: #fff;
      border-radius: 12px;
      padding: 13px;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: #666;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .btn {
      border: 1px solid #444;
      background: transparent;
      color: #fff;
      border-radius: 999px;
      padding: 11px 16px;
      cursor: pointer;
    }

    .btn.primary {
      background: #fff;
      color: #000;
      border-color: #fff;
      font-weight: 700;
    }

    .btn.danger {
      color: var(--danger);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .full {
      width: 100%;
    }

    .message {
      min-height: 21px;
      font-size: 13px;
      margin: 12px 0 0;
    }

    .error {
      color: var(--danger);
    }

    .success {
      color: var(--success);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .topbar-inner {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand img {
      width: 34px;
    }

    .brand small {
      display: block;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .main {
      padding: 28px 0 70px;
    }

    .intro p {
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
      align-items: start;
    }

    .panel-head {
      padding: 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .form {
      padding: 18px;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .span-2 {
      grid-column: 1 / -1;
    }

    .checks {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ddd;
      font-size: 14px;
    }

    .check input {
      width: 18px;
      height: 18px;
    }

    .preview {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px dashed #444;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: var(--muted);
      overflow: hidden;
      margin-bottom: 10px;
    }

    .preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .form-actions {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .project {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }

    .project:last-child {
      border-bottom: 0;
    }

    .project img {
      width: 90px;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      border-radius: 10px;
      background: #111;
    }

    .project h3 {
      margin: 0 0 4px;
      font-size: 15px;
    }

    .project p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .project-actions {
      display: flex;
      gap: 7px;
      margin-top: 10px;
    }

    .empty {
      padding: 30px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .list-panel {
        order: -1;
      }
    }

    @media (max-width: 560px) {
      .fields {
        grid-template-columns: 1fr;
      }

      .span-2 {
        grid-column: auto;
      }

      .form-actions {
        flex-direction: column;
      }

      .form-actions .btn {
        width: 100%;
      }

      .view-site {
        display: none;
      }
    }
  </style>
</head>

<body>

  <section id="loginScreen" class="login">
    <form
      id="loginForm"
      class="card login-card"
      onsubmit="return false;"
    >
      <img
        class="logo"
        src="https://i.ibb.co/vCkfYL5M/batulogo2026png-1.png"
        alt="BATU"
      >

      <h1>Yönetim Paneli</h1>

      <p>Projelerini telefondan yönet.</p>

      <div class="field">
        <label for="email">E-posta</label>

        <input
          id="email"
          type="email"
          autocomplete="email"
          required
        >
      </div>

      <div class="field">
        <label for="password">Şifre</label>

        <input
          id="password"
          type="password"
          autocomplete="current-password"
          required
        >
      </div>

      <button
        id="loginBtn"
        class="btn primary full"
        type="button"
      >
        Giriş Yap
      </button>

      <p id="loginMessage" class="message"></p>
    </form>
  </section>

  <div id="dashboard" class="hidden">

    <header class="topbar">
      <div class="wrap topbar-inner">

        <div class="brand">
          <img
            src="https://i.ibb.co/vCkfYL5M/batulogo2026png-1.png"
            alt="BATU"
          >

          <div>
            <strong>BATU Yönetim</strong>
            <small id="adminEmail"></small>
          </div>
        </div>

        <div class="actions">
          <a
            class="btn view-site"
            href="/"
            target="_blank"
          >
            Siteyi Gör
          </a>

          <button
            id="logoutBtn"
            class="btn"
            type="button"
          >
            Çıkış
          </button>
        </div>

      </div>
    </header>

    <main class="wrap main">

      <section class="intro">
        <h1>Projeler</h1>
        <p>Yeni proje ekle veya mevcut projeleri düzenle.</p>
      </section>

      <div class="grid">

        <section class="panel">

          <div class="panel-head">
            <h2 id="formTitle">Yeni proje</h2>
          </div>

          <form
            id="projectForm"
            class="form"
            onsubmit="return false;"
          >

            <input id="projectId" type="hidden">
            <input id="existingImage" type="hidden">

            <div class="fields">

              <div>
                <label for="title">Proje başlığı *</label>
                <input id="title" required>
              </div>

              <div>
                <label for="slug">Bağlantı adı *</label>
                <input id="slug" required>
              </div>

              <div>
                <label for="category">Kategori</label>
                <input id="category">
              </div>

              <div>
                <label for="year">Yıl</label>

                <input
                  id="year"
                  type="number"
                  inputmode="numeric"
                >
              </div>

              <div class="span-2">
                <label for="shortDescription">
                  Kısa açıklama
                </label>

                <textarea id="shortDescription"></textarea>
              </div>

              <div class="span-2">
                <label for="description">
                  Detaylı açıklama
                </label>

                <textarea id="description"></textarea>
              </div>

              <div class="span-2">
                <label for="coverFile">Kapak görseli</label>

                <div id="preview" class="preview">
                  Görsel seçilmedi
                </div>

                <input
                  id="coverFile"
                  type="file"
                  accept="image/jpeg,image/png,image/webp,image/gif"
                >
              </div>

              <div class="span-2">
                <label for="projectUrl">
                  Proje bağlantısı
                </label>

                <input
                  id="projectUrl"
                  type="url"
                  placeholder="https://"
                >
              </div>

              <div>
                <label for="sortOrder">Sıralama</label>

                <input
                  id="sortOrder"
                  type="number"
                  value="0"
                >
              </div>

              <div>
                <label>Yayın ayarları</label>

                <div class="checks">

                  <label class="check">
                    <input
                      id="published"
                      type="checkbox"
                      checked
                    >
                    Yayında
                  </label>

                  <label class="check">
                    <input
                      id="featured"
                      type="checkbox"
                    >
                    Öne çıkar
                  </label>

                </div>
              </div>

            </div>

            <div class="form-actions">

              <button
                id="saveBtn"
                class="btn primary"
                type="button"
              >
                Projeyi Kaydet
              </button>

              <button
                id="cancelBtn"
                class="btn hidden"
                type="button"
              >
                Düzenlemeyi İptal Et
              </button>

              <button
                id="clearBtn"
                class="btn"
                type="button"
              >
                Formu Temizle
              </button>

            </div>

            <p id="formMessage" class="message"></p>

          </form>
        </section>

        <aside class="panel list-panel">

          <div class="panel-head">

            <div>
              <h2>Mevcut projeler</h2>
              <small id="projectCount">Yükleniyor…</small>
            </div>

            <button
              id="refreshBtn"
              class="btn"
              type="button"
            >
              Yenile
            </button>

          </div>

          <div id="projectList">
            <div class="empty">
              Projeler yükleniyor…
            </div>
          </div>

        </aside>

      </div>
    </main>

  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"
  ></script>

  <script>
    const SUPABASE_URL =
      "https://phreqbjgynchbynmtefz.supabase.co";

    const SUPABASE_KEY =
      "sb_publishable_BWfR-8PgH0RIfLDngFDjUA_2vbIo-Ae";

    const $ = (id) => document.getElementById(id);

    let sb;
    let projects = [];
    let previewUrl = "";

    function setMessage(element, text, type = "") {
      element.textContent = text;
      element.className = `message ${type}`;
    }

    function escapeHTML(value = "") {
      return String(value).replace(
        /[&<>"']/g,
        (character) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        })[character]
      );
    }

    function slugify(value) {
      return value
        .toLocaleLowerCase("tr-TR")
        .trim()
        .replaceAll("ı", "i")
        .replaceAll("ğ", "g")
        .replaceAll("ü", "u")
        .replaceAll("ş", "s")
        .replaceAll("ö", "o")
        .replaceAll("ç", "c")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function showLogin() {
      $("loginScreen").classList.remove("hidden");
      $("dashboard").classList.add("hidden");
    }

    function showDashboard(user) {
      $("loginScreen").classList.add("hidden");
      $("dashboard").classList.remove("hidden");
      $("adminEmail").textContent = user.email || "";

      loadProjects();
    }

    async function login() {
      setMessage($("loginMessage"), "");

      const email = $("email").value.trim();
      const password = $("password").value;

      if (!email || !password) {
        setMessage(
          $("loginMessage"),
          "E-posta ve şifreyi doldur.",
          "error"
        );

        return;
      }

      $("loginBtn").disabled = true;
      $("loginBtn").textContent = "Giriş yapılıyor…";

      try {
        const { data, error } =
          await sb.auth.signInWithPassword({
            email,
            password
          });

        if (error) {
          throw error;
        }

        showDashboard(data.user);
      } catch (error) {
        setMessage(
          $("loginMessage"),
          error.message || "Giriş başarısız.",
          "error"
        );
      } finally {
        $("loginBtn").disabled = false;
        $("loginBtn").textContent = "Giriş Yap";
      }
    }

    async function loadProjects() {
      $("projectList").innerHTML =
        '<div class="empty">Projeler yükleniyor…</div>';

      const { data, error } = await sb
        .from("projects")
        .select("*")
        .order("sort_order", {
          ascending: true
        })
        .order("created_at", {
          ascending: false
        });

      if (error) {
        $("projectList").innerHTML =
          `<div class="empty">${escapeHTML(error.message)}</div>`;

        return;
      }

      projects = data || [];

      renderProjects();
    }

    function renderProjects() {
      $("projectCount").textContent =
        `${projects.length} proje`;

      if (!projects.length) {
        $("projectList").innerHTML =
          '<div class="empty">Henüz proje yok.</div>';

        return;
      }

      $("projectList").innerHTML = projects
        .map((project) => `
          <article class="project">

            <img
              src="${escapeHTML(project.cover_image)}"
              alt=""
            >

            <div>

              <h3>
                ${escapeHTML(project.title)}
              </h3>

              <p>
                ${escapeHTML(project.category || "Kategorisiz")}
                ${
