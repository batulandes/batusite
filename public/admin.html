<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#000000">
  <title>BATU — Admin</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html{color-scheme:dark}
    body{
      min-height:100vh;
      background:#000;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif
    }
    [hidden]{display:none!important}
    button,input,textarea{font:inherit;color:inherit}
    button{cursor:pointer}
    .wrap{width:min(900px,calc(100% - 28px));margin:auto}
    header{
      height:70px;
      border-bottom:1px solid #222;
      display:flex;
      align-items:center
    }
    .head{
      display:flex;
      align-items:center;
      justify-content:space-between
    }
    .logo{font-size:22px;font-weight:800}
    main{padding:35px 0 80px}
    .login{
      min-height:calc(100vh - 140px);
      display:grid;
      place-items:center
    }
    .card{
      padding:22px;
      background:#080808;
      border:1px solid #262626;
      border-radius:20px
    }
    .login-card{width:min(430px,100%)}
    h1{
      font-size:42px;
      line-height:.95;
      letter-spacing:-.05em
    }
    h2{font-size:22px;margin-bottom:18px}
    p{
      margin-top:12px;
      color:#888;
      font-size:14px;
      line-height:1.6
    }
    label{
      display:block;
      margin-top:16px;
      color:#aaa;
      font-size:12px
    }
    input,textarea{
      width:100%;
      min-height:49px;
      margin-top:8px;
      padding:12px 14px;
      background:#020202;
      border:1px solid #292929;
      border-radius:12px;
      outline:none
    }
    textarea{min-height:90px;resize:vertical}
    input:focus,textarea:focus{border-color:#666}
    .button{
      width:100%;
      min-height:50px;
      margin-top:18px;
      border:0;
      border-radius:999px;
      background:#fff;
      color:#000;
      font-weight:700
    }
    .button:disabled{opacity:.5}
    .small{
      width:auto;
      min-height:38px;
      margin:0;
      padding:0 14px;
      color:#bbb;
      background:#080808;
      border:1px solid #292929;
      font-size:12px
    }
    .message{
      display:none;
      margin-top:14px;
      padding:12px;
      color:#aaa;
      background:#020202;
      border:1px solid #292929;
      border-radius:11px;
      font-size:13px;
      line-height:1.5;
      overflow-wrap:anywhere
    }
    .message.show{display:block}
    .message.error{color:#ff6b6b}
    .message.success{color:#7de39a}
    .title{text-align:center;margin-bottom:28px}
    .title h1{font-size:clamp(48px,9vw,75px)}
    .card+.card{margin-top:18px}
    .upload{
      position:relative;
      min-height:145px;
      margin-top:15px;
      display:grid;
      place-items:center;
      background:#020202;
      border:1px dashed #444;
      border-radius:14px;
      text-align:center
    }
    .upload input{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      margin:0;
      opacity:0
    }
    .upload span{
      display:block;
      margin-top:7px;
      color:#777;
      font-size:12px
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:13px
    }
    .full{grid-column:1/-1}
    .check{
      display:flex;
      align-items:center;
      gap:10px;
      min-height:49px;
      padding:0 13px;
      margin-top:15px;
      background:#020202;
      border:1px solid #292929;
      border-radius:12px
    }
    .check input{width:18px;height:18px;margin:0}
    .toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:15px
    }
    .list{display:grid;gap:10px}
    .item{
      display:grid;
      grid-template-columns:75px minmax(0,1fr) auto;
      align-items:center;
      gap:12px;
      padding:10px;
      background:#020202;
      border:1px solid #292929;
      border-radius:13px
    }
    .item img{
      width:75px;
      height:75px;
      object-fit:cover;
      border-radius:8px
    }
    .item h3{font-size:14px}
    .meta{margin-top:6px;color:#777;font-size:11px}
    .actions{display:flex;flex-direction:column;gap:6px}
    .action{
      min-width:75px;
      min-height:34px;
      padding:0 10px;
      background:#090909;
      border:1px solid #292929;
      border-radius:999px;
      font-size:11px
    }
    .delete{color:#ff6b6b}
    .empty{padding:25px;color:#777;text-align:center;font-size:13px}
    @media(max-width:620px){
      .grid{grid-template-columns:1fr}
      .full{grid-column:auto}
      .item{grid-template-columns:70px minmax(0,1fr)}
      .actions{grid-column:1/-1;flex-direction:row}
      .action{flex:1}
    }
  </style>
</head>

<body>

<header>
  <div class="wrap head">
    <strong class="logo">BATU</strong>

    <button
      id="logout"
      class="button small"
      type="button"
      hidden
    >
      Çıkış
    </button>
  </div>
</header>

<main class="wrap">

  <section id="loginView" class="login">
    <div class="card login-card">

      <h1>Admin girişi</h1>

      <p>
        E-posta adresine tek kullanımlık giriş bağlantısı gönderilecek.
        Şifre gerekmiyor.
      </p>

      <label for="email">E-posta</label>

      <input
        id="email"
        type="email"
        autocomplete="email"
        placeholder="mail@adresin.com"
      >

      <button
        id="sendLink"
        class="button"
        type="button"
      >
        Giriş bağlantısı gönder
      </button>

      <div id="authMessage" class="message"></div>

    </div>
  </section>

  <section id="dashboard" hidden>

    <div class="title">
      <h1>Tasarım Arşivi</h1>
      <p>Galeriden seç, yükle, yayınla veya sil.</p>
    </div>

    <section class="card">

      <h2>Yeni tasarım</h2>

      <form id="uploadForm">

        <label class="upload">
          <input
            id="file"
            type="file"
            accept="image/*"
            required
          >

          <div>
            <strong>Galeriden görsel seç</strong>
            <span id="fileName">PNG, JPG veya WEBP</span>
          </div>
        </label>

        <div class="grid">

          <label>
            Başlık
            <input id="baslik" type="text">
          </label>

          <label>
            Kategori
            <input id="kategori" type="text">
          </label>

          <label>
            Yıl
            <input
              id="yil"
              type="number"
              inputmode="numeric"
              placeholder="2026"
            >
          </label>

          <label>
            Sıra
            <input
              id="sira"
              type="number"
              inputmode="numeric"
              value="0"
            >
          </label>

          <label class="full">
            Açıklama
            <textarea id="aciklama"></textarea>
          </label>

        </div>

        <label class="check">
          <input id="yayinlandi" type="checkbox" checked>
          Hemen yayınla
        </label>

        <button
          id="uploadButton"
          class="button"
          type="submit"
        >
          Tasarımı yükle
        </button>

        <div id="uploadMessage" class="message"></div>

      </form>

    </section>

    <section class="card">

      <div class="toolbar">
        <h2>Yüklenenler</h2>

        <button
          id="refresh"
          class="button small"
          type="button"
        >
          Yenile
        </button>
      </div>

      <div id="list" class="list"></div>

    </section>

  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
"use strict";

const URL =
  "https://phreqbjgynchbynmtefz.supabase.co";

const KEY =
  "sb_publishable_BWfR-8PgH0RIfLDngFDjUA_2vbIo-Ae";

const client =
  window.supabase.createClient(URL, KEY);

const loginView =
  document.getElementById("loginView");

const dashboard =
  document.getElementById("dashboard");

const logout =
  document.getElementById("logout");

const authMessage =
  document.getElementById("authMessage");

const uploadMessage =
  document.getElementById("uploadMessage");

const list =
  document.getElementById("list");

function message(element, text, type = "") {
  element.textContent = text;
  element.className = "message show " + type;
}

function view(loggedIn) {
  loginView.hidden = loggedIn;
  dashboard.hidden = !loggedIn;
  logout.hidden = !loggedIn;

  if (loggedIn) {
    loadDesigns();
  }
}

document
  .getElementById("sendLink")
  .addEventListener("click", async () => {
    const button =
      document.getElementById("sendLink");

    const email =
      document
        .getElementById("email")
        .value
        .trim();

    if (!email) {
      message(
        authMessage,
        "E-posta adresini yaz.",
        "error"
      );
      return;
    }

    button.disabled = true;
    button.textContent = "Gönderiliyor...";

    const { error } =
      await client.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo:
            "https://batuhota.com/admin.html"
        }
      });

    button.disabled = false;
    button.textContent =
      "Giriş bağlantısı gönder";

    if (error) {
      message(
        authMessage,
        error.message,
        "error"
      );
      return;
    }

    message(
      authMessage,
      "Bağlantı gönderildi. E-postanı kontrol et.",
      "success"
    );
  });

logout.addEventListener("click", async () => {
  await client.auth.signOut();
  view(false);
});

client.auth.onAuthStateChange(
  (_event, session) => {
    view(Boolean(session));
  }
);

async function checkSession() {
  const { data } =
    await client.auth.getSession();

  view(Boolean(data.session));
}

const file =
  document.getElementById("file");

file.addEventListener("change", () => {
  document.getElementById("fileName")
    .textContent =
      file.files?.[0]?.name ||
      "PNG, JPG veya WEBP";
});

function cleanName(name) {
  return name
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .replace(/\.[^.]+$/, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "")
    .slice(0, 60) || "tasarim";
}

document
  .getElementById("uploadForm")
  .addEventListener(
    "submit",
    async event => {
      event.preventDefault();

      const selected =
        file.files?.[0];

      if (!selected) {
        message(
          uploadMessage,
          "Önce görsel seç.",
          "error"
        );
        return;
      }

      const button =
        document.getElementById(
          "uploadButton"
        );

      button.disabled = true;
      button.textContent =
        "Yükleniyor...";

      const extension =
        selected.name
          .split(".")
          .pop()
          .toLowerCase();

      const path =
        `${Date.now()}-` +
        `${cleanName(selected.name)}.` +
        `${extension}`;

      const {
        error: uploadError
      } =
        await client.storage
          .from("tasarimlar")
          .upload(
            path,
            selected,
            {
              cacheControl: "31536000",
              upsert: false
            }
          );

      if (uploadError) {
        message(
          uploadMessage,
          uploadError.message,
          "error"
        );

        button.disabled = false;
        button.textContent =
          "Tasarımı yükle";
        return;
      }

      const { data: urlData } =
        client.storage
          .from("tasarimlar")
          .getPublicUrl(path);

      const baslik =
        document
          .getElementById("baslik")
          .value
          .trim();

      const kategori =
        document
          .getElementById("kategori")
          .value
          .trim();

      const yil =
        document
          .getElementById("yil")
          .value;

      const sira =
        document
          .getElementById("sira")
          .value;

      const aciklama =
        document
          .getElementById("aciklama")
          .value
          .trim();

      const yayinlandi =
        document
          .getElementById("yayinlandi")
          .checked;

      const {
        error: databaseError
      } =
        await client
          .from("tasarimlar")
          .insert({
            baslik:
              baslik ||
              selected.name.replace(
                /\.[^.]+$/,
                ""
              ),

            gorsel_url:
              urlData.publicUrl,

            dosya_yolu:
              path,

            kategori:
              kategori || null,

            yil:
              yil ? Number(yil) : null,

            aciklama:
              aciklama || null,

            sira:
              sira ? Number(sira) : 0,

            yayinlandi
          });

      if (databaseError) {
        await client.storage
          .from("tasarimlar")
          .remove([path]);

        message(
          uploadMessage,
          databaseError.message,
          "error"
        );
      } else {
        document
          .getElementById("uploadForm")
          .reset();

        document
          .getElementById("sira")
          .value = "0";

        document
          .getElementById("yayinlandi")
          .checked = true;

        document
          .getElementById("fileName")
          .textContent =
            "PNG, JPG veya WEBP";

        message(
          uploadMessage,
          "Tasarım yüklendi.",
          "success"
        );

        loadDesigns();
      }

      button.disabled = false;
      button.textContent =
        "Tasarımı yükle";
    }
  );

async function loadDesigns() {
  list.innerHTML =
    '<div class="empty">Yükleniyor...</div>';

  const { data, error } =
    await client
      .from("tasarimlar")
      .select("*")
      .order(
        "created_at",
        { ascending: false }
      );

  if (error) {
    list.innerHTML =
      `<div class="empty">${error.message}</div>`;
    return;
  }

  if (!data.length) {
    list.innerHTML =
      '<div class="empty">Henüz tasarım yok.</div>';
    return;
  }

  list.innerHTML = "";

  data.forEach(design => {
    const item =
      document.createElement("article");

    item.className = "item";

    item.innerHTML = `
      <img
        src="${design.gorsel_url}"
        alt=""
      >

      <div>
        <h3>
          ${design.baslik || "Başlıksız"}
        </h3>

        <div class="meta">
          ${design.kategori || ""}
          ${design.yil || ""}
        </div>
      </div>

      <div class="actions">

        <button
          class="action toggle"
          type="button"
        >
          ${
            design.yayinlandi
              ? "Gizle"
              : "Yayınla"
          }
        </button>

        <button
          class="action delete"
          type="button"
        >
          Sil
        </button>

      </div>
    `;

    item
      .querySelector(".toggle")
      .addEventListener(
        "click",
        async () => {
          const { error } =
            await client
              .from("tasarimlar")
              .update({
                yayinlandi:
                  !design.yayinlandi
              })
              .eq("id", design.id);

          if (error) {
            alert(error.message);
          } else {
            loadDesigns();
          }
        }
      );

    item
      .querySelector(".delete")
      .addEventListener(
        "click",
        async () => {
          if (
            !confirm(
              "Bu tasarım silinsin mi?"
            )
          ) {
            return;
          }

          const {
            error: storageError
          } =
            await client.storage
              .from("tasarimlar")
              .remove([
                design.dosya_yolu
              ]);

          if (storageError) {
            alert(storageError.message);
            return;
          }

          const {
            error: databaseError
          } =
            await client
              .from("tasarimlar")
              .delete()
              .eq("id", design.id);

          if (databaseError) {
            alert(databaseError.message);
          } else {
            loadDesigns();
          }
        }
      );

    list.appendChild(item);
  });
}

document
  .getElementById("refresh")
  .addEventListener(
    "click",
    loadDesigns
  );

checkSession();
</script>

</body>
</html>
