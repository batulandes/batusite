<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>İşbirlikleri — BATU</title>

  <meta
    name="description"
    content="BATU işbirlikleri."
  >

  <meta name="theme-color" content="#000000">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      color-scheme: dark;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      color: #ffffff;
      background: #000000;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Arial,
        sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .container {
      width: min(1200px, calc(100% - 36px));
      margin-inline: auto;
    }

    .topbar {
      position: fixed;
      inset: 0 0 auto;
      z-index: 100;
      height: 76px;
      background: rgba(0, 0, 0, 0.82);
      border-bottom: 1px solid #181818;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }

    .topbar-inner {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-link {
      color: #929292;
      font-size: 13px;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: #ffffff;
    }

    .brand {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .empty-space {
      width: 75px;
    }

    main {
      padding: 155px 0 130px;
    }

    .heading {
      margin-bottom: 115px;
      text-align: center;
    }

    .heading h1 {
      font-size: clamp(55px, 10vw, 130px);
      line-height: 0.9;
      letter-spacing: -0.075em;
    }

    .logos {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(115px, 17vw, 230px);
    }

    .logo {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo img {
      width: auto;
      height: auto;
      object-fit: contain;
      transition:
        opacity 0.25s ease,
        transform 0.25s ease;
    }

    .logo:hover img {
      opacity: 0.72;
      transform: scale(0.985);
    }

    .xdrive img {
      max-width: min(570px, 78vw);
      max-height: 180px;
    }

    .hawk img {
      max-width: min(470px, 73vw);
      max-height: 210px;
    }

    .razer img {
      max-width: min(550px, 78vw);
      max-height: 190px;
    }

    .hytale img {
      max-width: min(610px, 82vw);
      max-height: 250px;
    }

    footer {
      padding: 35px 20px;
      color: #555555;
      border-top: 1px solid #181818;
      font-size: 11px;
      text-align: center;
    }

    @media (max-width: 600px) {
      .container {
        width: min(100% - 24px, 1200px);
      }

      .topbar {
        height: 68px;
      }

      main {
        padding: 125px 0 100px;
      }

      .heading {
        margin-bottom: 90px;
      }

      .heading h1 {
        font-size: clamp(49px, 16vw, 78px);
      }

      .logos {
        gap: 125px;
      }

      .xdrive img {
        max-width: 82vw;
      }

      .hawk img {
        max-width: 75vw;
      }

      .razer img {
        max-width: 82vw;
      }

      .hytale img {
        max-width: 86vw;
      }

      .empty-space {
        width: 55px;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="container topbar-inner">

      <a
        class="back-link"
        href="/"
      >
        ← Ana sayfa
      </a>

      <a
        class="brand"
        href="/"
      >
        BATU
      </a>

      <div class="empty-space"></div>

    </div>
  </header>

  <main>
    <div class="container">

      <div class="heading">
        <h1>İşbirlikleri.</h1>
      </div>

      <section
        class="logos"
        aria-label="İşbirlikleri"
      >

        <div class="logo xdrive">
          <img
            src="https://cdn.discordapp.com/attachments/1255133297277796474/1527717005250269244/20260717_194135.png?ex=6a5bacd5&is=6a5a5b55&hm=530b9438fc6d1e310b2c0fddb0bbf2a8a4cd01af8052062256f04be4bda25fdd&"
            alt="XDrive"
          >
        </div>

        <div class="logo hawk">
          <img
            src="https://cdn.discordapp.com/attachments/1255133297277796474/1527713206133587998/20240830_140258.png?ex=6a5ba94b&is=6a5a57cb&hm=22053b209c5fcf1c4b37366d0b27ba318721d00c59c049cc5bdf76b8a56bc88f&"
            alt="Hawk Gaming Chair"
          >
        </div>

        <div class="logo razer">
          <img
            src="https://cdn.discordapp.com/attachments/1282627807901515797/1282633161892691968/2024-creatorprogram-logo-white.png?ex=6a5b46b7&is=6a59f537&hm=b9356ed5f16af638bc5f159a17871328eb4ee9e90837bbff3a25b8d2de66c7f6&"
            alt="Razer"
          >
        </div>

        <div class="logo hytale">
          <img
            src="https://cdn.discordapp.com/attachments/1255133297277796474/1527715811492364329/file_0000000028607243a7a4d0ad1fd8b7b2.png?ex=6a5babb9&is=6a5a5a39&hm=53e9f378feff2a0e9a4db13799fcc4f9034c46757cc6ebc7ef5660f53ae5cb0e&"
            alt="Hytale"
          >
        </div>

      </section>

    </div>
  </main>

  <footer>
    © 2026 BATU
  </footer>

</body>
</html>
