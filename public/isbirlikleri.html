<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>İşbirlikleri — BATU</title><meta name="description" content="BATU ve Lemonhota marka işbirlikleri"><meta name="theme-color" content="#000"><link rel="canonical" href="https://www.batuhota.com/isbirlikleri"><link rel="stylesheet" href="/fonts.css?v=1"><link rel="stylesheet" href="/site-shell.css?v=2"><script src="/site-shell.js?v=2" defer></script><style>
:root{--border:#202020;--muted:#929292;--container:1260px}*{box-sizing:border-box;margin:0;padding:0}html{color-scheme:dark}body{min-height:100vh;background:#000;color:#fff;font-family:var(--font-primary,Arial,sans-serif);-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}img{display:block;max-width:100%}.container{width:min(var(--container),calc(100% - 48px));margin:auto}.topbar{position:fixed;inset:0 0 auto;z-index:50;height:78px;background:rgba(0,0,0,.75);border-bottom:1px solid var(--border);backdrop-filter:blur(18px)}.topbar-inner{position:relative;height:100%;display:flex;align-items:center;justify-content:space-between}.back{color:#888;font-size:13px}.top-logo{position:absolute;left:50%;width:54px;height:54px;transform:translateX(-50%)}.top-logo img{width:100%;height:100%;object-fit:contain}.page-label{color:#666;font-size:10px;letter-spacing:.14em}.hero{min-height:70vh;display:grid;place-items:center;padding:130px 0 75px;text-align:center}.eyebrow{color:#707070;font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase}h1{margin-top:20px;font-size:clamp(62px,10vw,145px);line-height:.86;letter-spacing:-.075em}.hero p:last-child{max-width:650px;margin:28px auto 0;color:var(--muted);font-size:16px;line-height:1.7}.partners{padding:25px 0 125px}.partner-list{display:grid;gap:clamp(90px,13vw,175px)}.partner{display:grid;place-items:center;text-align:center}.partner-logo{width:min(620px,75vw);height:170px;object-fit:contain;filter:grayscale(1);transition:filter .25s ease,transform .35s ease}.partner:hover .partner-logo{filter:none;transform:scale(1.025)}.partner-copy{margin-top:28px}.partner-copy span{color:#666;font-size:9px;letter-spacing:.15em;text-transform:uppercase}.partner-copy h2{margin-top:10px;font-size:clamp(27px,4vw,48px);letter-spacing:-.045em}.partner-copy p{max-width:560px;margin:12px auto 0;color:#7f7f7f;font-size:13px;line-height:1.65}.loading{padding:100px 0;text-align:center;color:#777}.footer{padding:34px 24px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);color:#666;font-size:11px}.footer img{width:76px;opacity:.55}@media(max-width:720px){.container{width:min(100% - 22px,var(--container))}.topbar{height:70px}.page-label{display:none}.hero{min-height:62vh}.partner-logo{height:115px;width:82vw}.footer{flex-direction:column;gap:17px}}
</style></head><body><header class="topbar"><div class="container topbar-inner"><a class="back" href="/">← Ana sayfa</a><a class="top-logo" href="/"><img src="/logolar/BATU%20Logo%20Beyaz.png" alt="BATU"></a><span class="page-label">İŞBİRLİKLERİ</span></div></header><main><section class="hero"><div class="container"><p class="eyebrow">BATU · LEMONHOTA</p><h1>İşbirlikleri.</h1><p>İçerik, topluluk ve özel dijital projelerde birlikte ürettiğimiz markalar.</p></div></section><section class="partners"><div class="container"><div class="loading" id="loading">İşbirlikleri yükleniyor…</div><div class="partner-list" id="partner-list"></div></div></section></main><footer class="footer"><span>© 2026 BATU · Tüm hakları saklıdır.</span><a href="/logo"><img src="/logolar/BATU%20Logo%20Yatay%20Beyaz.png" alt="BATU"></a></footer><script>
const INDEX="https://phreqbjgynchbynmtefz.supabase.co/storage/v1/object/public/timelapse/collaborations.json";
const DEFAULTS=[
  {ad:"XDrive",tur:"Marka İşbirliği",aciklama:"İçerik ve topluluk projelerinde gerçekleştirilen marka iş birliği.",logo_url:"https://www.xdrive.com.tr/theme/v5-xdrive/assets/icons/footer-logo.svg",link:null,sira:0,yayinlandi:true},
  {ad:"Hawk Gaming Chair",tur:"Proje Partneri",aciklama:"Limon Tayfa Özeti 2025 dahil özel içerik projelerinde birlikte üretim.",logo_url:"https://percdn.com/f/619128/bzR6WmFtNG0vcUp3ZUdFOVU1NG5hQT09/l/logo-21213039-sw320sh116.webp",link:null,sira:1,yayinlandi:true},
  {ad:"Razer",tur:"Creator Program",aciklama:"Razer Creator Program kapsamında kurulan üretici bağlantısı.",logo_url:"https://cdn.simpleicons.org/razer/FFFFFF",link:null,sira:2,yayinlandi:true},
  {ad:"Hytale",tur:"Topluluk",aciklama:"Oyun topluluğu ve içerik üretimi odağında gerçekleştirilen çalışma.",logo_url:"https://hytale.com/images/logo.webp",link:null,sira:3,yayinlandi:true}
];
const esc=(v="")=>String(v).replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"})[c]);async function load(){let values=DEFAULTS;try{const response=await fetch(`${INDEX}?v=${Date.now()}`,{cache:"no-store"});if(response.ok)values=await response.json()}catch{}const visible=values.filter(v=>v.yayinlandi&&v.logo_url).sort((a,b)=>a.sira-b.sira);document.getElementById("partner-list").innerHTML=visible.map(v=>`${v.link?`<a class="partner" href="${esc(v.link)}" target="_blank" rel="noopener">`:'<article class="partner">'}<img class="partner-logo" src="${esc(v.logo_url)}" alt="${esc(v.ad)}"><div class="partner-copy"><span>${esc(v.tur||"İşbirliği")}</span><h2>${esc(v.ad)}</h2>${v.aciklama?`<p>${esc(v.aciklama)}</p>`:""}</div>${v.link?'</a>':'</article>'}`).join("");document.getElementById("loading").hidden=true}load();
</script></body></html>
