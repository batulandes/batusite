<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kanal — BATU</title><meta name="description" content="BATU kanal arşivi"><meta name="theme-color" content="#000"><link rel="stylesheet" href="/fonts.css?v=1"><style>
:root{--border:#202020;--muted:#929292;--container:1320px}*{box-sizing:border-box;margin:0;padding:0}html{color-scheme:dark}body{min-height:100vh;background:#000;color:#fff;font-family:var(--font-primary,Arial,sans-serif);-webkit-font-smoothing:antialiased}[hidden]{display:none!important}a{color:inherit;text-decoration:none}img{display:block;max-width:100%}.container{width:min(var(--container),calc(100% - 48px));margin:auto}.topbar{position:fixed;inset:0 0 auto;z-index:50;height:78px;background:rgba(0,0,0,.75);border-bottom:1px solid var(--border);backdrop-filter:blur(18px)}.topbar-inner{position:relative;height:100%;display:flex;align-items:center;justify-content:space-between}.back{color:#888;font-size:13px}.top-logo{position:absolute;left:50%;width:54px;height:54px;transform:translateX(-50%)}.top-logo img{width:100%;height:100%;object-fit:contain}.page-label{color:#666;font-size:10px;letter-spacing:.14em}.loading,.missing{min-height:100vh;display:grid;place-items:center;text-align:center;color:#777}.hero{position:relative;min-height:88vh;display:grid;place-items:center;padding:130px 0 75px;overflow:hidden;text-align:center}.hero-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.36;filter:blur(3px);transform:scale(1.02)}.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.45),#000 100%)}.hero-content{position:relative;z-index:1}.channel-logo{width:125px;height:125px;margin:0 auto 24px;object-fit:cover;border-radius:50%;border:2px solid #333}.eyebrow{color:#777;font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase}h1{margin-top:18px;font-size:clamp(65px,11vw,150px);line-height:.86;letter-spacing:-.075em}.hero-description{max-width:700px;margin:28px auto 0;color:#aaa;font-size:17px;line-height:1.7}.hero-actions{display:flex;justify-content:center;gap:10px;margin-top:28px}.button{min-height:48px;display:inline-flex;align-items:center;padding:0 21px;border:1px solid #333;border-radius:999px;font-size:12px}.button.primary{background:#fff;color:#000;border-color:#fff}.stats{padding:80px 0 115px}.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.stat{min-height:180px;display:grid;place-items:center;padding:25px;background:#080808;border:1px solid var(--border);border-radius:20px;text-align:center}.stat strong{font-size:clamp(34px,5vw,65px);letter-spacing:-.055em}.stat span{display:block;margin-top:10px;color:#777;font-size:11px;text-transform:uppercase;letter-spacing:.1em}.videos{padding:110px 0;border-top:1px solid var(--border)}.videos[hidden]{display:none}.section-head{text-align:center}.section-head h2{margin-top:15px;font-size:clamp(42px,7vw,92px);line-height:.9;letter-spacing:-.065em}.video-grid{margin-top:50px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.video-card{overflow:hidden;background:#080808;border:1px solid var(--border);border-radius:18px}.video-card img{width:100%;aspect-ratio:16/9;object-fit:cover}.video-copy{padding:18px;text-align:center}.video-copy h3{font-size:18px}.video-copy p{margin-top:9px;color:#888;font-size:12px;line-height:1.55}.footer{padding:34px 24px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);color:#666;font-size:11px}.footer img{width:76px;opacity:.55}@media(max-width:720px){.container{width:min(100% - 22px,var(--container))}.topbar{height:70px}.page-label{display:none}.hero{min-height:78vh}.stats-grid,.video-grid{grid-template-columns:1fr}.stat{min-height:140px}.hero-actions{flex-direction:column}.hero-actions .button{justify-content:center}.footer{flex-direction:column;gap:17px}}
</style></head><body><header class="topbar"><div class="container topbar-inner"><a class="back" href="/#channels">← Kanallar</a><a class="top-logo" href="/"><img src="https://i.ibb.co/vCkfYL5M/batulogo2026png-1.png" alt="BATU"></a><span class="page-label">KANAL ARŞİVİ</span></div></header><div class="loading" id="loading">Kanal yükleniyor…</div><div class="missing" id="missing" hidden>Kanal bulunamadı.</div><main id="page" hidden><section class="hero"><img class="hero-bg" id="banner" src="" alt=""><div class="container hero-content"><img class="channel-logo" id="logo" src="" alt=""><p class="eyebrow">BATU · KANAL ARŞİVİ</p><h1 id="name"></h1><p class="hero-description" id="description"></p><div class="hero-actions"><a class="button primary" id="channel-link" target="_blank" rel="noopener">Kanala Git ↗</a><a class="button" href="#videolar">Videoları İncele ↓</a></div></div></section><section class="stats"><div class="container stats-grid"><article class="stat"><div><strong id="subscribers"></strong><span>Abone</span></div></article><article class="stat"><div><strong id="views"></strong><span>Görüntüleme</span></div></article><article class="stat"><div><strong id="video-count"></strong><span>Video</span></div></article></div></section><section class="videos" id="favorites" hidden><div class="container"><div class="section-head"><p class="eyebrow">Seçtiklerim</p><h2>En sevilen videolar.</h2></div><div class="video-grid" id="favorite-grid"></div></div></section><section class="videos" id="liked" hidden><div class="container"><div class="section-head"><p class="eyebrow">Topluluğun seçimi</p><h2>En çok beğenilenler.</h2></div><div class="video-grid" id="liked-grid"></div></div></section></main><footer class="footer" id="footer" hidden><span>© 2026 BATU · Kanal arşivi</span><a href="/logo"><img src="/logolar/BATU%20Logo%20Yatay%20Beyaz.png" alt="BATU"></a></footer><script>
const INDEX="https://phreqbjgynchbynmtefz.supabase.co/storage/v1/object/public/timelapse/channels.json";
const DEFAULTS=[
  {slug:"batu",ad:"BATU",aciklama:"Kısa kesitler, yayın anları ve özgün video projelerinin buluştuğu ana BATU kanalı.",logo_url:"https://i.ibb.co/3ypbvs47/batumetal26renk.png",banner_url:"https://i.ibb.co/vC08Ty4X/20260715-215703.jpg",kanal_url:"https://youtube.com/@batuclips",abone:"60,5 B",goruntulenme:"165 M",video_sayisi:"255",videolar:[],yayinlandi:true},
  {slug:"lemonhota",ad:"Lemonhota",aciklama:"Limon Tayfa içerikleri, topluluk projeleri ve özel yıllık yapımların merkezi.",logo_url:"https://yt3.googleusercontent.com/crso4xn6gfLnyIBaX8n2-I9NralQ3TY-DphR90vlPuC2RZNErRnh45a1OI8o2cQ7FB1J44LLQg=s900-c-k-c0x00ffffff-no-rj",banner_url:"https://i.ibb.co/s9jZj0Bf/20260715-221218.jpg",kanal_url:"https://youtube.com/@lemonhota",abone:"48,1 B",goruntulenme:"14 M",video_sayisi:"240",videolar:[],yayinlandi:true}
];
const $=id=>document.getElementById(id);const slug=decodeURIComponent(location.pathname.split("/").filter(Boolean).pop()||"");const esc=(v="")=>String(v).replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"})[c]);function cards(values,target){$(target).innerHTML=values.map(v=>`<a class="video-card" href="${esc(v.url)}" target="_blank" rel="noopener">${v.gorsel_url?`<img src="${esc(v.gorsel_url)}" alt="" loading="lazy">`:""}<div class="video-copy"><h3>${esc(v.baslik)}</h3>${v.aciklama?`<p>${esc(v.aciklama)}</p>`:""}</div></a>`).join("")}async function load(){try{let values=DEFAULTS;try{const response=await fetch(`${INDEX}?v=${Date.now()}`,{cache:"no-store"});if(response.ok)values=await response.json()}catch{}const item=values.find(v=>v.slug===slug&&v.yayinlandi);if(!item)throw 0;document.title=`${item.ad} Kanalı — BATU`;$('banner').src=item.banner_url||"";$('logo').src=item.logo_url||"";$('logo').alt=item.ad;$('name').textContent=item.ad;$('description').textContent=item.aciklama||"";$('subscribers').textContent=item.abone||"—";$('views').textContent=item.goruntulenme||"—";$('video-count').textContent=item.video_sayisi||"—";$('channel-link').href=item.kanal_url||"#";const fav=(item.videolar||[]).filter(v=>v.tur==="sevilen"),liked=(item.videolar||[]).filter(v=>v.tur==="begenilen");if(fav.length){$('favorites').hidden=false;cards(fav,'favorite-grid')}if(liked.length){$('liked').hidden=false;cards(liked,'liked-grid')}$('loading').hidden=true;$('page').hidden=false;$('footer').hidden=false}catch{$('loading').hidden=true;$('missing').hidden=false}}load();
</script></body></html>
